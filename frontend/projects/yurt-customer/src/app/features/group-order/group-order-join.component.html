<div class="min-h-screen bg-stone-50 pb-8 flex flex-col">
  <div class="bg-white border-b border-stone-100 px-4 py-4 sticky top-0 z-10">
    <h1 class="text-xl font-bold text-stone-800">Join Group Order</h1>
    <p class="text-xs text-stone-500 mt-0.5">Enter the 6-character code shared by your friend</p>
  </div>

  <div class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl border border-stone-100 shadow-sm p-6">
        <div class="text-center mb-6">
          <div class="text-5xl mb-3">👥</div>
          <p class="text-stone-500 text-sm">Ask the group creator for their share code</p>
        </div>

        <input
          type="text"
          [(ngModel)]="code"
          (ngModelChange)="code = code.toUpperCase()"
          placeholder="ABC123"
          maxlength="6"
          class="w-full text-center text-2xl font-bold tracking-widest px-4 py-4 rounded-2xl border-2 border-stone-200 focus:border-amber-400 focus:ring-2 focus:ring-amber-100 outline-none uppercase"
        />

        @if (error()) {
          <p class="text-red-500 text-xs text-center mt-2">{{ error() }}</p>
        }

        <button
          (click)="join()"
          [disabled]="loading() || code.trim().length !== 6"
          class="w-full mt-4 bg-amber-500 hover:bg-amber-600 active:scale-[0.98] disabled:opacity-60 text-white font-bold rounded-2xl py-4 text-base shadow-lg transition-all"
        >
          {{ loading() ? 'Joining…' : 'Join Group' }}
        </button>
      </div>
    </div>
  </div>
</div>
