<div class="min-h-screen bg-stone-50">
  <!-- Header -->
  <div class="bg-linear-to-br from-amber-500 to-amber-600 sticky top-0 z-20 shadow-md px-4 pt-5 pb-4">
    <h1 class="text-xl font-bold text-white">{{ 'loc.title' | t }}</h1>
    <p class="text-sm text-amber-100 mt-0.5">{{ 'loc.subtitle' | t }}</p>
  </div>

  <div class="p-4 space-y-3 max-w-lg mx-auto pb-28">
    @if (loading()) {
      @for (i of [1, 2, 3]; track i) {
        <yurt-skeleton-card />
      }
    } @else {
      @for (loc of locations(); track loc.id) {
        <button
          (click)="select(loc)"
          [class]="
            selectedId() === loc.id
              ? 'ring-2 ring-amber-400 border-amber-200 bg-amber-50'
              : 'border-stone-100 bg-white hover:border-amber-200 hover:bg-amber-50/40'
          "
          class="w-full text-left rounded-2xl border-2 p-4 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-amber-400"
        >
          <div class="flex items-start justify-between gap-3">
            <div
              class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center text-xl shrink-0"
            >
              📍
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-stone-800 text-base">{{ loc.name }}</h3>
              <p class="text-stone-500 text-sm mt-0.5">{{ loc.address }}</p>
              <div class="flex gap-3 mt-2">
                <span class="text-amber-600 text-xs font-medium">🕐 {{ loc.workingHours }}</span>
                <span class="text-stone-400 text-xs">📞 {{ loc.contactPhone }}</span>
              </div>
            </div>
            <div
              [class]="selectedId() === loc.id ? 'bg-amber-400 scale-110' : 'bg-stone-100'"
              class="w-6 h-6 rounded-full flex items-center justify-center shrink-0 transition-all mt-1"
            >
              @if (selectedId() === loc.id) {
                <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20">
                  <path
                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                  />
                </svg>
              }
            </div>
          </div>
        </button>
      }

      @if (!locations().length) {
        <div class="text-center py-20">
          <div class="text-5xl mb-4">📍</div>
          <p class="text-stone-600 font-medium">{{ 'loc.noLocations' | t }}</p>
          <p class="text-stone-400 text-sm mt-1">{{ 'loc.checkLater' | t }}</p>
        </div>
      }
    }
  </div>

  @if (selectedId()) {
    <div
      class="fixed bottom-16 left-0 right-0 p-4 bg-white border-t border-stone-100 max-w-lg mx-auto"
      style="box-shadow: 0 -1px 12px rgba(0, 0, 0, 0.06)"
    >
      <button
        (click)="confirm()"
        class="w-full bg-amber-500 hover:bg-amber-600 active:scale-[0.98] text-white font-bold rounded-2xl py-4 text-base shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2"
      >
        {{ 'loc.continue' | t }}
      </button>
    </div>
  }
</div>
