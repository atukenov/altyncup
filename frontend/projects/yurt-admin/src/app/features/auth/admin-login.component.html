<div
  class="min-h-screen bg-gradient-to-br from-stone-800 to-stone-900 flex items-center justify-center p-4"
>
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">☕</div>
      <h1 class="text-2xl font-bold text-stone-800">Altyncup Admin</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
    </div>

    <form (ngSubmit)="login()" #form="ngForm">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
          <input
            type="text"
            name="username"
            [(ngModel)]="username"
            required
            autocomplete="username"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-amber-400 focus:border-transparent outline-none transition-all"
            placeholder="e.g. admin"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-amber-400 focus:border-transparent outline-none transition-all"
            placeholder="••••••••"
          />
        </div>
      </div>

      @if (error()) {
        <p class="mt-3 text-red-600 text-xs text-center">{{ error() }}</p>
      }

      <div class="mt-6">
        <yurt-button
          type="submit"
          variant="primary"
          size="lg"
          [fullWidth]="true"
          [loading]="loading()"
        >
          Sign In
        </yurt-button>
      </div>
    </form>
  </div>
</div>
