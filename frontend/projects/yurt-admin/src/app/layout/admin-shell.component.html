<div class="min-h-screen flex bg-slate-50">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm flex-shrink-0">
    <!-- Logo -->
    <div class="px-6 py-5 border-b border-slate-100">
      <div class="flex items-center gap-2">
        <span class="text-2xl">☕</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">Yurt Admin</h1>
          <p class="text-xs text-slate-400">Management Console</p>
        </div>
      </div>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a
        routerLink="/orders"
        routerLinkActive="bg-amber-50 text-amber-700 font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors text-sm"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4M7 4h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"
          />
        </svg>
        Live Orders
      </a>
      <a
        routerLink="/menu"
        routerLinkActive="bg-amber-50 text-amber-700 font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors text-sm"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
          />
        </svg>
        Menu Management
      </a>
      <a
        routerLink="/locations"
        routerLinkActive="bg-amber-50 text-amber-700 font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors text-sm"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
        Locations
      </a>
      <a
        routerLink="/analytics"
        routerLinkActive="bg-amber-50 text-amber-700 font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors text-sm"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
          />
        </svg>
        Analytics
      </a>
      <a
        routerLink="/promotions"
        routerLinkActive="bg-amber-50 text-amber-700 font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors text-sm"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"
          />
        </svg>
        Promotions
      </a>
    </nav>

    <!-- User info -->
    <div class="px-4 py-4 border-t border-slate-100">
      <div class="flex items-center gap-2 mb-3">
        <div
          class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-sm font-bold text-amber-700"
        >
          {{ initials() }}
        </div>
        <div class="min-w-0">
          <p class="text-sm font-medium text-slate-800 truncate">
            {{ auth.currentUser?.displayName }}
          </p>
          <p class="text-xs text-slate-400">{{ auth.currentUser?.role }}</p>
        </div>
      </div>
      <button
        (click)="logout()"
        class="w-full text-left text-xs text-red-500 hover:text-red-700 px-2 py-1 rounded-lg hover:bg-red-50 transition-colors"
      >
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-hidden flex flex-col min-w-0">
    <router-outlet />
  </main>
</div>
